<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.2/build/css/intlTelInput.css"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);

    padding:25px;

}

.container{

    width:100%;
    max-width:550px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:35px;

    color:white;

    box-shadow:0 20px 45px rgba(0,0,0,.25);

}

h1{

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

margin-bottom:30px;

opacity:.9;

}

label{

display:block;

margin-bottom:8px;

font-weight:500;

}

.input{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:12px;

margin-bottom:18px;

font-size:15px;

transition:.25s;

}

.input:focus{

box-shadow:0 0 0 4px rgba(255,255,255,.3);

transform:translateY(-2px);

}

.gender{

display:flex;

gap:30px;

margin-bottom:20px;

}

.gender label{

display:flex;

align-items:center;

gap:8px;

cursor:pointer;

font-weight:400;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:white;

color:#4f46e5;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 15px 25px rgba(0,0,0,.25);

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

.thanks{

display:none;

text-align:center;

}

.thanks h2{

margin-bottom:15px;

}

/* Make the phone input fill the container */
.iti {
    width: 100%;
    margin-bottom: 18px;
}

/* Match your existing .input style */
.iti__tel-input,
.iti input {
    width: 100%;
    padding: 15px !important;
    padding-left: 90px !important; /* Space for flag + code */
    border: none;
    outline: none;
    border-radius: 12px;
    font-size: 15px;
    background: white;
    color: #222;
}

/* Flag dropdown area */
.iti__selected-country {
    padding: 0 12px;
}

/* Dropdown menu */
.iti__country-list {
    background: white;
    color: #222;
    border-radius: 10px;
    max-height: 250px;
}

/* Search box (newer versions) */
.iti__search-input {
    background: white;
    color: #222;
}

/* Selected country on hover */
.iti__country:hover {
    background: #f3f4f6;
}


</style>

</head>

<body>

<div class="container" id="formCard">

<h1>Registration</h1>

<p class="subtitle">
Please fill in all the details below.
</p>

<form id="myForm">

<label>Full Name</label>

<input
id="name"
class="input"
type="text"
placeholder="Enter your full name"
required>

<label>Phone Number</label>

<div class="phone">

<input
  id="phone"
  class="input"
  type="tel"
  required
>
</div>

<label>Email Address</label>

<input
id="email"
class="input"
type="email"
placeholder="example@email.com"
required>

<label>Gender</label>

<div class="gender">

<label>
<input
type="radio"
name="gender"
value="Male"
required>
Male
</label>

<label>
<input
type="radio"
name="gender"
value="Female"
required>
Female
</label>

</div>

<label>Occupation</label>

<input
id="occupation"
class="input"
type="text"
placeholder="Occupation"
required>

<label>Current Location</label>

<input
id="location"
class="input"
type="text"
placeholder="City, State"
required>

<button id="submitBtn" type="submit">
Submit
</button>

</form>

</div>

<div class="container thanks" id="thanks">

<h1>🎉</h1>

<h2>Thank You!</h2>

<p>
Your response has been submitted successfully.
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.2/build/js/intlTelInput.min.js"></script>

<script>
const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput, {
    initialCountry: "in",
    separateDialCode: true
});
// ----------------------------
// Replace these two values
// ----------------------------

const SUPABASE_URL = "https://oprzoiyxjgxyebegusog.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcnpvaXl4amd4eWViZWd1c29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzIwODAsImV4cCI6MjA5ODgwODA4MH0.pMVEqCJKFbwa9c0CzpmvvT3ftYzgDgwTxBKrLisD0fs";

// ----------------------------

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const form = document.getElementById("myForm");

const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

submitBtn.disabled=true;
submitBtn.innerText="Submitting...";

const name=document.getElementById("name").value.trim();

const phone_code="+" + iti.getSelectedCountryData().dialCode;

const phone=phoneInput.value.trim();

const email=document.getElementById("email").value.trim();

const occupation=document.getElementById("occupation").value.trim();

const location=document.getElementById("location").value.trim();

const gender=document.querySelector('input[name="gender"]:checked').value;

const {error}=await supabaseClient
.from("registrations")
.insert([
{
name,
phone_code,
phone,
email,
gender,
occupation,
location
}
]);

if(error){

console.error(error);

alert("Failed to save your details.");

submitBtn.disabled=false;
submitBtn.innerText="Submit";

return;

}

document.getElementById("formCard").style.display="none";

document.getElementById("thanks").style.display="block";

});

</script>

</body>
</html>
