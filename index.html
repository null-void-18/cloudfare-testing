<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.2/build/css/intlTelInput.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
html{scroll-behavior:smooth}
body{background:#0b1220;color:#fff}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center/cover}
.hero::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.58)}
.content{position:relative;max-width:760px;text-align:center;padding:30px}
.badge{display:inline-block;background:#ffffff22;padding:8px 16px;border-radius:999px;margin-bottom:20px}
h1{animation: colorChange 5s infinite;font-size:clamp(2.3rem,5vw,4rem);margin-bottom:18px;color: red;}
.hurry{line-height:1.7;color:#e5e7eb;font-size:2rem;color: red;}
.cta{display:inline-block;margin-top:28px;padding:16px 34px;background:grey;color:#fff;text-decoration:none;border-radius:12px;font-weight:600}
.cta:hover{background:#4338ca}
.section{padding:70px 20px;background:linear-gradient(135deg,#46e5c8,#27c4eb)}
.container{max-width:560px;margin:auto;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:34px;border-radius:20px}
label{display:block;margin:14px 0 8px}
.input,.iti input{width:100%;padding:15px;border:none;border-radius:12px}
.iti{width:100%;margin-bottom:8px}
.gender{display:flex;gap:24px;margin:10px 0 18px}
button{width:100%;padding:16px;border:none;border-radius:12px;background:lightgoldenrodyellow;color:grey;font-weight:700;cursor:pointer}
.thanks{display:none;text-align:center;padding:90px 20px}
@keyframes colorChange{
    0%   { color:#ffffff; }
    10%  { color:#ff4d4d; }
    20%  { color:#ffd700; }
    30%  { color:#00e676; }
    40%  { color:#00b0ff; }
    50% { color:#ffffff; }
    60%  { color:#ff4d4d; }
    70%  { color:#ffd700; }
    80%  { color:#00e676; }
    90%  { color:#00b0ff; }
    100% { color:#ffffff; }
}
</style>
</head>
<body>

<section class="hero">
<div class="content">
<div class="badge"></div>
<h1>CONGRATULATIONS!!!🎉🎉🎉 YOU'VE WON A PRIZE</h1>
<p class = "hurry">Hurry, complete the form below to claim the prize before the deadline!!!</p>
<a href="#register" class="cta">Fill Details Here</a>
</div>
</section>

<section class="section" id="register">
<div class="container" id="formCard">
<h2 style="text-align:center;margin-bottom:10px;color:#0F172A">Registration Form</h2>
<p style="text-align:center;margin-bottom:20px;color:#334155">Please fill in all your details.</p>

<form id="myForm">
<label style="color:#334155">Full Name</label>
<input id="name" class="input" required>

<label style="color:#334155">Phone Number</label>
<input id="phone" class="input" type="tel" required>

<label style="color:#334155">Email Address</label>
<input id="email" class="input" type="email" required>

<label style="color:#334155">Gender</label>
<div class="gender">
<label style="color:#334155"><input type="radio" name="gender" value="Male" required> Male</label>
<label style="color:#334155"><input type="radio" name="gender" value="Female"> Female</label>
</div>

<label style="color:#334155">Occupation</label>
<input id="occupation" class="input" required>

<label style="color:#334155">Current Location</label>
<input id="location" class="input" required>
<label></label>
<button id="submitBtn">Submit</button>
</form>
</div>

<div class="thanks container" id="thanks">
<h2>🎉 Thank You!</h2>
<p>Your registration has been received successfully.</p>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.2/build/js/intlTelInput.min.js"></script>
<script>
const phoneInput=document.querySelector("#phone");
const iti=window.intlTelInput(phoneInput,{initialCountry:"in",separateDialCode:true});

const SUPABASE_URL="https://oprzoiyxjgxyebegusog.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcnpvaXl4amd4eWViZWd1c29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzIwODAsImV4cCI6MjA5ODgwODA4MH0.pMVEqCJKFbwa9c0CzpmvvT3ftYzgDgwTxBKrLisD0fs";
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

myForm.addEventListener("submit",async(e)=>{
e.preventDefault();
submitBtn.disabled=true;
submitBtn.textContent="Submitting...";

const payload = {
    name: document.getElementById("name").value.trim(),
    phone_code: "+" + iti.getSelectedCountryData().dialCode,
    phone: phoneInput.value.trim(),
    email: document.getElementById("email").value.trim(),
    gender: document.querySelector('input[name="gender"]:checked').value,
    occupation: document.getElementById("occupation").value.trim(),
    location: document.getElementById("location").value.trim()
};

const {error}=await supabaseClient.from("registrations").insert([payload]);

if(error){
alert("Failed to save details.");
console.error(error);
submitBtn.disabled=false;
submitBtn.textContent="Submit";
return;
}
formCard.style.display="none";
thanks.style.display="block";
});
</script>
</body>
</html>
